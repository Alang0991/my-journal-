<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>My Journal</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <!-- LOGIN -->

    <div
        id="loginScreen"
        class="screen active"
    >

        <div class="login-card">

            <div class="login-top">

                <h1>My Journal</h1>

                <p>
                    A private place for your thoughts,
                    memories, reflections, and late-night writing.
                </p>

            </div>

            <input
                type="password"
                id="passwordInput"
                placeholder="Enter Password"
            >

            <button onclick="login()">
                Unlock Journal
            </button>

            <p id="loginError"></p>

        </div>

    </div>

    <!-- APP -->

    <div
        id="journalApp"
        class="hidden"
    >

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="sidebar-top">

                <h2>Journal</h2>

                <button onclick="newEntry()">
                    + New Entry
                </button>

            </div>

            <input
                type="text"
                id="searchBox"
                placeholder="Search entries..."
            >

            <div class="stats">

                <div class="stat-card">

                    <span>Total Entries</span>

                    <strong id="entryCount">
                        0
                    </strong>

                </div>

                <div class="stat-card">

                    <span>Total Words</span>

                    <strong id="wordCount">
                        0
                    </strong>

                </div>

            </div>

            <div id="entryList"></div>

            <button
                class="export-btn"
                onclick="exportEntries()"
            >
                Export Backup
            </button>

        </aside>

        <!-- MAIN -->

        <main class="main-area">

            <!-- TOPBAR -->

            <div class="topbar">

                <div>

                    <input
                        type="text"
                        id="entryTitle"
                        placeholder="Untitled Entry"
                    >

                    <p class="subtitle">
                        Your private writing space
                    </p>

                </div>

                <select id="moodSelect">

                    <option value="Neutral">
                        Neutral
                    </option>

                    <option value="Happy">
                        Happy
                    </option>

                    <option value="Sad">
                        Sad
                    </option>

                    <option value="Angry">
                        Angry
                    </option>

                    <option value="Anxious">
                        Anxious
                    </option>

                    <option value="Excited">
                        Excited
                    </option>

                </select>

            </div>

            <!-- EDITOR -->

            <div class="editor-wrapper">

                <textarea
                    id="journalText"
                    placeholder="Start writing..."
                ></textarea>

            </div>

            <!-- BOTTOM -->

            <div class="bottom-bar">

                <span id="saveStatus">
                    Saved
                </span>

                <span id="liveWordCount">
                    0 words
                </span>

            </div>

        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
